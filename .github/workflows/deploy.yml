name: Build and Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'reports-mcp/**'
      - '.github/workflows/deploy-mcp.yml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/laapak-reports

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:backend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          file: ./frontend-react/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:frontend-latest
          build-args: |
            NEXT_PUBLIC_IMGBB_API_KEY=${{ secrets.NEXT_PUBLIC_IMGBB_API_KEY }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            BACKEND_URL=http://report-system:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          CATBOX_USERHASH: ${{ secrets.CATBOX_USERHASH }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EVOLUTION_URL: ${{ secrets.EVOLUTION_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_INSTANCE: ${{ secrets.EVOLUTION_INSTANCE }}
          EVOLUTION_TOKEN: ${{ secrets.EVOLUTION_TOKEN }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          NEXT_PUBLIC_IMGBB_API_KEY: ${{ secrets.NEXT_PUBLIC_IMGBB_API_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: CATBOX_USERHASH,JWT_SECRET,EVOLUTION_URL,EVOLUTION_API_KEY,EVOLUTION_INSTANCE,EVOLUTION_TOKEN,FB_ACCESS_TOKEN,NEXT_PUBLIC_IMGBB_API_KEY,NEXT_PUBLIC_API_URL
          script: |
            set -e
            cd /home/deploy/laapak-projects/reports
            rm -f .git/index.lock || true
            git remote remove origin || true
            git remote add origin https://github.com/saifnasserer/Laapak-Report-System.git || true
            # Backup .env if it exists to prevent git reset --hard from deleting it
            mv .env .env.tmp || true
            git checkout -- remote-docker-compose.yml || true
            git fetch --depth=1 https://github.com/saifnasserer/Laapak-Report-System.git main
            git reset --hard FETCH_HEAD
            # Restore .env
            mv .env.tmp .env || true
            touch .env
            
            # Update .env file with secrets
            echo "PORT=3001" > .env
            echo "NODE_ENV=production" >> .env
            echo "CATBOX_USERHASH=$CATBOX_USERHASH" >> .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "EVOLUTION_URL=$EVOLUTION_URL" >> .env
            echo "EVOLUTION_API_KEY=$EVOLUTION_API_KEY" >> .env
            echo "EVOLUTION_INSTANCE=$EVOLUTION_INSTANCE" >> .env
            echo "EVOLUTION_TOKEN=$EVOLUTION_TOKEN" >> .env
            echo "FB_ACCESS_TOKEN=$FB_ACCESS_TOKEN" >> .env
            echo "FB_GRAPH_VERSION=v18.0" >> .env
            echo "NEXT_PUBLIC_IMGBB_API_KEY=$NEXT_PUBLIC_IMGBB_API_KEY" >> .env
            echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" >> .env
            
            docker compose -f remote-docker-compose.yml pull
            docker compose -f remote-docker-compose.yml up -d
            
            # Idempotently ensure nginx allows large Catbox video uploads
            # (default client_max_body_size 1m would 413 any upload >1MB).
            cat << 'PYEOF' > /tmp/ensure_catbox_nginx.py
            import re, sys
            conf = '/home/deploy/fz-projects/system/docker-infra/nginx/conf.d/laapak_services.conf'
            with open(conf) as f: c = f.read()
            if 'client_max_body_size 256m' not in c:
                m = re.search(r'(server_name\s+reports\.laapak\.com;)', c)
                if m:
                    guard = ('\n    client_max_body_size 256m;'
                             '\n    proxy_connect_timeout 300s;'
                             '\n    proxy_send_timeout 600s;'
                             '\n    proxy_read_timeout 600s;')
                    c = c.replace(m.group(1), m.group(1) + guard, 1)
                    with open(conf, 'w') as f: f.write(c)
                    print('Added client_max_body_size 256m to reports.laapak.com')
                else:
                    print('WARN: reports.laapak.com server block not found')
            else:
                print('client_max_body_size already set')
            PYEOF
            python3 /tmp/ensure_catbox_nginx.py || true
            
            docker restart nginx-proxy
            docker image prune -f
