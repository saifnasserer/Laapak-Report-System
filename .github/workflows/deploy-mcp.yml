name: Deploy Reports MCP

on:
  push:
    branches: [ main ]
    paths:
      - 'reports-mcp/**'
      - '.github/workflows/deploy-mcp.yml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/laapak-reports

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: ./reports-mcp
          file: ./reports-mcp/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:mcp-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/deploy/laapak-projects/reports
            rm -f .git/index.lock || true
            git remote remove origin || true
            git remote add origin https://github.com/saifnasserer/Laapak-Report-System.git || true
            # Backup .env if it exists to prevent git reset --hard from deleting it
            mv .env .env.tmp || true
            git checkout -- remote-docker-compose.yml || true
            git fetch --depth=1 https://github.com/saifnasserer/Laapak-Report-System.git main
            git reset --hard FETCH_HEAD
            # Restore .env
            mv .env.tmp .env || true
            touch .env
            
            docker compose -f remote-docker-compose.yml pull reports-mcp
            docker compose -f remote-docker-compose.yml up -d reports-mcp
            
            cat << 'EOF' > /tmp/update_nginx.py
            import sys
            import re

            conf_path = '/home/deploy/fz-projects/system/docker-infra/nginx/conf.d/laapak_services.conf'
            with open(conf_path, 'r') as f:
                content = f.read()

            changed = False

            # --- Idempotently ensure Catbox video uploads (up to 200MB)
            # are not rejected by nginx's default client_max_body_size 1m.
            # Insert the directives right after the reports.laapak.com
            # server_name line if they are not already present in that block.
            cms_pattern = re.compile(
                r'(server_name\s+reports\.laapak\.com;)(?!.*?client_max_body_size)(.*?)(\n\s*location|\n\s*ssl_certificate|\Z)',
                re.DOTALL,
            )
            cms_match = cms_pattern.search(content)
            if cms_match and 'client_max_body_size 256m' not in content:
                cms_block = ('\n    client_max_body_size 256m;'
                             '\n    proxy_connect_timeout 300s;'
                             '\n    proxy_send_timeout 600s;'
                             '\n    proxy_read_timeout 600s;')
                content = cms_pattern.sub(r'\1' + cms_block + r'\2\3', content, count=1)
                changed = True
                print('Added client_max_body_size 256m to reports.laapak.com server block')
            else:
                print('client_max_body_size already set (or server block not found)')

            if 'location /mcp/' in content:
                print('MCP location already exists in Nginx config')
            else:
                # Insert the location block right after `server_name reports.laapak.com;`
                pattern = re.compile(r'(server_name\s+reports\.laapak\.com;)')
                if pattern.search(content):
                    new_location = """
            location /mcp/ {
                set $upstream_reports_mcp http://82.112.253.29:3015;
                proxy_pass $upstream_reports_mcp;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_buffering off;
                proxy_read_timeout 300;
                proxy_connect_timeout 300;
            }
            """
                    content = pattern.sub(r'\1\n' + new_location, content)
                    changed = True
                    print('Successfully added /mcp/ location block')
                else:
                    print('Error: Could not find reports.laapak.com server block')
                    if not changed:
                        sys.exit(1)

            if changed:
                with open(conf_path, 'w') as f:
                    f.write(content)
            EOF
            python3 /tmp/update_nginx.py
            
            docker exec nginx-proxy nginx -s reload
