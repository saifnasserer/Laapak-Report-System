networks:
  laapak-network:
    external: true
    name: laapak-network
services:
  # Services using existing infrastructure
  report-system:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: saifnasser/laapak-reports:backend-latest
    container_name: report-system
    env_file:
      - .env
    environment:
      - DB_HOST=mysql-db
      - DB_USER=laapak
      - DB_PASSWORD=laapaksql
      - DB_NAME=laapak_report_system
      - DB_PORT=3306
    networks:
      - laapak-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    ports:
      - 3001:3001
    restart: always
  laapak-frontend-react:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://report-system:3001
        - NEXT_PUBLIC_API_URL=https://reports.laapak.com/api
    image: saifnasser/laapak-reports:frontend-latest
    container_name: laapak-frontend-react
    environment:
      - BACKEND_URL=http://report-system:3001
      - NEXT_PUBLIC_API_URL=https://reports.laapak.com/api
      - CATBOX_USERHASH=${CATBOX_USERHASH}
    networks:
      - laapak-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    ports:
      - 3000:3000
    restart: always
  reports-mcp:
    image: saifnasser/laapak-reports:mcp-latest
    container_name: reports-mcp
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://report-system:3001/api
      - PORT=3015
      - API_KEY=mcp_live_wh2pX7kR9mQ
      - JWT_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6OSwidHlwZSI6ImFkbWluIiwicm9sZSI6InN1cGVyYWRtaW4iLCJpYXQiOjE3ODI2NzI5MTYsImV4cCI6MjA5ODAzMjkxNn0.2ZbOpOff920yVti1kjPXu_aW4GxLuM47ghyB-qBCMmg
    networks:
      - laapak-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - 3015:3015
    restart: always
volumes:
  mysql_data: null
  postgres_data: null
  n8n_data: null
